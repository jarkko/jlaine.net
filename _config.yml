# ----------------------- #
#      Main Configs       #
# ----------------------- #

url: https://jlaine.net
title: jlaine.net
author: Jarkko Laine
description:

date_format: "%B %-d, %Y"

# RSS feed
subscribe_rss: /feed.xml

# ----------------------- #
#    Jekyll & Plugins     #
# ----------------------- #

source: source
destination: public

permalink: /:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

paginate: 10
paginate_path: "/blog/page:num/"

excerpt_separator: "<!--more-->"

# jekyll-archives: category pages
jekyll-archives:
  enabled:
    - categories
  layout: category_index
  permalinks:
    category: /blog/categories/:name/

# ----------------------- #
#   3rd Party Settings    #
# ----------------------- #

google_analytics_id: ""   # Add your GA4 measurement ID (G-XXXXXXX) here

# Disqus (leave blank to disable comments)
disqus_short_name: ""

# ----------------------- #
#   Build settings        #
# ----------------------- #

sass:
  style: compressed
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-archives
