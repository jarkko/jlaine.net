---
layout: default
---

<div class="blog-index">
  {% assign index = true %}
  {% for post in paginator.posts %}
    <article>
      {% include article.html post=post %}
    </article>
  {% endfor %}
  <div class="pagination">
    {% if paginator.next_page %}
      <a class="prev" href="{{ paginator.next_page_path | relative_url }}">&larr; Older</a>
    {% endif %}
    <a href="{{ '/blog/archives/' | relative_url }}">Blog Archives</a>
    {% if paginator.previous_page %}
      <a class="next" href="{{ paginator.previous_page_path | relative_url }}">Newer &rarr;</a>
    {% endif %}
  </div>
</div>
