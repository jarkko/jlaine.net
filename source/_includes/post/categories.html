{% assign _post = post | default: page %}
{% if _post.categories.size > 0 %}
<span class="categories">
  {% for cat in _post.categories %}
    {% assign _slug = cat | slugify %}
    <a href="{{ '/blog/categories/' | append: _slug | append: '/' | relative_url }}">{{ cat }}</a>{% unless forloop.last %}, {% endunless %}
  {% endfor %}
</span>
{% endif %}
