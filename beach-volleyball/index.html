<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nordic &amp; Baltic Beach Volleyball — indoor halls and outdoor sand courts map</title>
  <meta name="description" content="An interactive map and directory of indoor beach-volleyball halls and outdoor sand courts across Finland, Sweden, Norway, Denmark, Iceland, Estonia, Latvia and Lithuania." />
  <meta name="color-scheme" content="light" />

  <link rel="icon" type="image/svg+xml" href="mikasa-ball.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        crossorigin="anonymous" />

  <style>
    :root {
      --bg:          #fbf7ee;
      --bg-card:     #ffffff;
      --bg-soft:     #f5efe1;
      --line:        rgba(15, 23, 42, .08);
      --line-strong: rgba(15, 23, 42, .16);
      --ink:         #0f172a;
      --ink-soft:    #475569;
      --ink-faint:   #94a3b8;
      --accent:      #0f766e;
      --accent-soft: rgba(15, 118, 110, .12);
      --out-color:   #047857;
      --out-soft:    rgba(4, 120, 87, .12);

      --c-fi: #1f4fb6;
      --c-se: #d8a200;
      --c-no: #c8102e;
      --c-dk: #c8487a;
      --c-is: #14b8a6;

      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06);
      --shadow-md: 0 8px 24px -8px rgba(15, 23, 42, .18);
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      min-height: 100svh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    button { font: inherit; }
    h1, h2, h3 {
      font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
      font-weight: 700;
      letter-spacing: -.01em;
      margin: 0;
    }

    /* ---------- Topbar ---------- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: linear-gradient(180deg, #fff 0%, #fbf6e8 100%);
      border-bottom: 1px solid var(--line);
    }
    .topbar__mark {
      flex: none;
      width: 32px; height: 32px;
    }
    .topbar__mark img {
      width: 100%; height: 100%;
      display: block;
    }
    .topbar__title { min-width: 0; flex: 1; }
    .topbar__title h1 { font-size: 17px; line-height: 1.2; }
    .topbar__title p { margin: 2px 0 0; color: var(--ink-soft); font-size: 12px; }

    /* ---------- Mode switch ---------- */
    .mode-switch {
      flex: none;
      display: flex;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .mode-btn {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background .15s, color .15s, box-shadow .15s;
      white-space: nowrap;
      line-height: 1.4;
    }
    .mode-btn[aria-pressed="true"] {
      background: #fff;
      color: var(--ink);
      box-shadow: var(--shadow-sm);
    }
    .mode-btn:not([aria-pressed="true"]):hover { color: var(--ink); }

    /* ---------- Layout ---------- */
    .layout {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      min-height: 0;
    }

    /* ---------- Sidebar (overlay drawer) ---------- */
    .sidebar {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: min(380px, 92vw);
      z-index: 700;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-right: 1px solid var(--line);
      box-shadow: 14px 0 30px -18px rgba(15, 23, 42, .35);
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.4, 0, .2, 1), box-shadow .28s ease;
      min-height: 0;
    }
    .sidebar.is-open { transform: translateX(0); }
    .sidebar:not(.is-open) { box-shadow: none; }

    .sidebar-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, .14);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
      z-index: 690;
    }
    .layout.is-open .sidebar-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar__header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 0 20px;
    }
    .sidebar__title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -.01em;
      margin: 0;
    }
    .sidebar__close {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      color: var(--ink-soft);
      cursor: pointer;
      transition: border-color .15s, color .15s, transform .1s;
    }
    .sidebar__close:hover { border-color: var(--line-strong); color: var(--ink); }
    .sidebar__close:active { transform: scale(0.96); }
    .sidebar__close svg { width: 16px; height: 16px; }

    .sidebar-toggle {
      position: absolute;
      top: 14px; left: 14px;
      z-index: 510;
      display: inline-flex; align-items: center; gap: 9px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 14px 9px 11px;
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: border-color .15s, transform .12s;
    }
    .sidebar-toggle:hover { border-color: var(--line-strong); transform: translateY(-1px); }
    .sidebar-toggle:active { transform: translateY(0); }
    .sidebar-toggle svg { width: 18px; height: 18px; color: var(--ink-soft); flex: none; }
    .sidebar-toggle__count {
      background: var(--ink); color: #fff;
      border-radius: 999px;
      padding: 1px 8px 2px;
      font-size: 11.5px; font-weight: 600;
      letter-spacing: .01em;
    }

    .filters { padding: 12px 20px 12px; border-bottom: 1px solid var(--line); }
    .search {
      display: flex; align-items: center; gap: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: var(--shadow-sm);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .search:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .search input {
      flex: 1;
      border: 0; outline: 0; background: transparent;
      font: inherit; color: inherit; min-width: 0;
    }
    .search svg { width: 18px; height: 18px; color: var(--ink-faint); flex: none; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .chip {
      cursor: pointer;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink-soft);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12.5px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .chip:hover { border-color: var(--line-strong); }
    .chip[aria-pressed="true"] {
      background: var(--ink); color: #fff; border-color: var(--ink);
    }
    .chip__dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Mode notice banner */
    .mode-notice {
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #065f46;
      font-size: 11.5px;
      line-height: 1.45;
    }

    .venue-list {
      list-style: none;
      margin: 0; padding: 12px;
      overflow-y: auto;
      flex: 1;
      display: flex; flex-direction: column; gap: 8px;
      scrollbar-gutter: stable;
    }
    .venue-list__item { margin: 0; padding: 0; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      text-align: left;
      width: 100%;
      transition: border-color .15s ease, transform .15s ease, box-shadow .15s ease;
    }
    .card:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .card[aria-current="true"] {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-md);
    }
    .card--outdoor[aria-current="true"] {
      border-color: var(--out-color);
      box-shadow: 0 0 0 3px var(--out-soft), var(--shadow-md);
    }
    .card__flag {
      position: relative;
      width: 36px; height: 36px;
      border-radius: 10px;
      display: grid; place-items: center;
      background: var(--bg-soft);
      font-size: 18px;
      flex: none;
    }
    .card__flag::after {
      content: '';
      position: absolute; right: -3px; bottom: -3px;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--bg-card);
      background: var(--country, var(--accent));
    }
    .card__body { min-width: 0; }
    .card__name { font-weight: 600; font-size: 14.5px; line-height: 1.3; }
    .card__town { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }
    .card__meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

    .tag {
      font-size: 11.5px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--bg-soft);
      color: var(--ink-soft);
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tag--strong { background: var(--ink); color: #fff; }
    .tag--out    { background: #ecfdf5; color: #047857; }
    .tag--note   { background: #fef3c7; color: #92400e; }

    .sidebar__hint {
      padding: 10px 16px 16px;
      font-size: 12px;
      color: var(--ink-soft);   /* ink-faint (#94a3b8) fails WCAG AA; ink-soft (#475569) = 7.6:1 */
      border-top: 1px solid var(--line);
      margin: 0;
    }

    /* ---------- Map ---------- */
    .map-wrap { position: relative; min-height: 0; }
    #map { position: absolute; inset: 0; }
    #map.leaflet-container { background: #e8eef2; font: inherit; }

    .data-link {
      position: absolute;
      bottom: 14px; right: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      box-shadow: var(--shadow-md);
      z-index: 500;
    }
    .data-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ---------- Indoor markers ---------- */
    .bv-marker { background: transparent; border: 0; }
    .bv-marker__dot {
      display: flex;
      align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--country);
      border: 3px solid #fff;
      box-shadow: 0 2px 6px rgba(15, 23, 42, .25);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .bv-marker.is-active .bv-marker__dot {
      transform: scale(1.18);
      box-shadow: 0 0 0 4px var(--accent-soft), 0 4px 12px rgba(15, 23, 42, .35);
      z-index: 2;
    }

    .bv-cluster { background: transparent !important; border: 0 !important; }
    .bv-cluster__inner {
      display: flex;
      align-items: center; justify-content: center;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #0f172a;
      border: 3px solid #fff;
      box-shadow: 0 4px 14px rgba(15, 23, 42, .3);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
      transition: transform .15s ease;
    }
    .bv-cluster:hover .bv-cluster__inner { transform: scale(1.08); }
    .bv-cluster--lg .bv-cluster__inner { width: 48px; height: 48px; font-size: 15px; }

    /* ---------- Outdoor markers ---------- */
    .bv-out-marker { background: transparent; border: 0; }
    .bv-out-marker__dot {
      display: flex;
      align-items: center; justify-content: center;
      width: 22px; height: 22px;
      border-radius: 5px;
      background: var(--out-color);
      border: 2px solid #fff;
      box-shadow: 0 2px 5px rgba(15, 23, 42, .2);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .bv-out-marker.is-active .bv-out-marker__dot {
      transform: scale(1.3);
      box-shadow: 0 0 0 3px var(--out-soft), 0 3px 8px rgba(15, 23, 42, .3);
    }

    .bv-out-cluster { background: transparent !important; border: 0 !important; }
    .bv-out-cluster__inner {
      display: flex;
      align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--out-color);
      border: 2.5px solid #fff;
      box-shadow: 0 3px 10px rgba(15, 23, 42, .25);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      transition: transform .15s ease;
    }
    .bv-out-cluster:hover .bv-out-cluster__inner { transform: scale(1.06); }

    /* ---------- Floating UI on map ---------- */
    .source-badge {
      position: absolute;
      bottom: 14px; left: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px 6px 8px;
      font-size: 11.5px;
      color: var(--ink-soft);
      box-shadow: var(--shadow-sm);
      z-index: 500;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .source-badge__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* ---------- Popup ---------- */
    .leaflet-popup-content-wrapper {
      border-radius: 14px;
      box-shadow: var(--shadow-md);
      padding: 0;
    }
    .leaflet-popup-content { margin: 0; padding: 14px 16px; font: inherit; }
    .popup__name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 16px;
      margin: 0 0 2px;
    }
    .popup__meta { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 8px; }
    .popup__row  { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .popup__price{ font-size: 12.5px; color: var(--ink); margin: 0 0 10px; line-height: 1.45; }
    .popup__cta {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--ink); color: #fff;
      padding: 6px 12px; border-radius: 999px;
      text-decoration: none; font-size: 12.5px; font-weight: 500;
    }
    /*
     * Leaflet sets `.leaflet-container a { color: #0078A8 }` (specificity 0-1-1)
     * which beats `.popup__cta { color }` (0-1-0).  Bump specificity to 0-2-0
     * so our white-on-dark text wins regardless of visited/hover state.
     */
    .leaflet-container .popup__cta,
    .leaflet-container .popup__cta:visited,
    .leaflet-container .popup__cta:hover  { color: #fff; }
    .leaflet-container .popup__cta:hover  { background: var(--accent); }
    .popup__cta--out { background: var(--out-color); }
    .leaflet-container .popup__cta--out:hover { background: #065f46; }

    /* ---------- Focus-visible (keyboard navigation) ---------- */
    /*
     * Suppress the browser's default outline on pointer/touch clicks,
     * but keep a clear ring for keyboard navigation.
     */
    :focus:not(:focus-visible) { outline: none; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .card:focus-visible,
    .chip:focus-visible       { outline-offset: 3px; }

    .popup__cta:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
      box-shadow: 0 0 0 4px var(--accent);
    }
    .popup__cta--out:focus-visible {
      box-shadow: 0 0 0 4px var(--out-color);
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 700px) {
      .topbar { padding: 8px 12px; gap: 8px; }
      .topbar__title h1 { font-size: 14px; }
      .topbar__title p { display: none; }
      .mode-btn { padding: 4px 9px; font-size: 11px; }
      .sidebar {
        top: auto; right: 0; bottom: 0; left: 0;
        width: 100%;
        max-height: min(82svh, 640px);
        border-right: 0;
        border-top: 1px solid var(--line);
        border-radius: 18px 18px 0 0;
        box-shadow: 0 -18px 40px -24px rgba(15, 23, 42, .5);
        transform: translateY(105%);
      }
      .sidebar.is-open { transform: translateY(0); }
      .sidebar__header { padding: 14px 14px 0; }
      .filters { padding: 12px 14px; }
      .venue-list {
        padding: 10px;
        padding-bottom: calc(14px + env(safe-area-inset-bottom));
      }
      .card { padding: 12px; gap: 10px; }
      .card__flag { width: 32px; height: 32px; border-radius: 9px; }
      .sidebar-toggle {
        top: 10px; left: 10px;
        padding: 8px 12px 8px 10px;
      }
      .source-badge {
        left: 10px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        max-width: min(220px, calc(100vw - 108px));
      }
      .data-link {
        right: 10px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        padding: 7px 11px;
      }
      .leaflet-popup-content { max-width: min(280px, calc(100vw - 56px)); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="topbar__mark"><img src="mikasa-ball.svg" alt="Beach volleyball" width="32" height="32" /></span>
    <div class="topbar__title">
      <h1>Nordic &amp; Baltic Beach Volleyball</h1>
      <p>Indoor sand halls &amp; outdoor courts — Finland, Sweden, Norway, Denmark, Iceland, Estonia, Latvia &amp; Lithuania</p>
    </div>
    <div class="mode-switch" id="mode-switch" role="group" aria-label="Display mode">
      <button class="mode-btn" data-mode="indoor"  aria-pressed="true">Indoor</button>
      <button class="mode-btn" data-mode="outdoor" aria-pressed="false">Outdoor</button>
      <button class="mode-btn" data-mode="both"    aria-pressed="false">Both</button>
    </div>
  </header>

  <main class="layout" id="layout">
    <section class="map-wrap" aria-label="Map">
      <div id="map" aria-label="Interactive map of beach-volleyball venues"></div>

      <button class="sidebar-toggle" id="sidebar-toggle"
              aria-controls="sidebar" aria-expanded="false"
              title="Show venue directory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
        <span>Venues</span>
        <span class="sidebar-toggle__count" id="sidebar-toggle-count">…</span>
      </button>

      <span class="source-badge" id="source-badge" hidden>
        <span class="source-badge__dot" aria-hidden="true"></span>
        <span id="source-badge-text">Loading…</span>
      </span>
      <a class="data-link" href="nordic_indoor_beach_volleyball_facilities.csv" download>↓ CSV</a>
    </section>

    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>

    <aside class="sidebar" id="sidebar" aria-label="Venue directory">
      <div class="sidebar__header">
        <h2 class="sidebar__title">Venues</h2>
        <button class="sidebar__close" id="sidebar-close" aria-label="Close venue directory">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="6" y1="6" x2="18" y2="18"/>
            <line x1="6" y1="18" x2="18" y2="6"/>
          </svg>
        </button>
      </div>
      <div class="filters">
        <label class="search" aria-label="Search venues">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20l-3.5-3.5"></path>
          </svg>
          <input id="search" type="search"
                 placeholder="Search venues, towns, addresses…" autocomplete="off" />
        </label>
        <div class="chips" id="chips" aria-label="Filter venues by country"></div>
        <p class="mode-notice" id="mode-notice" hidden></p>
      </div>
      <ol class="venue-list" id="venues" role="list"></ol>
      <p class="sidebar__hint" id="hint"></p>
    </aside>
  </main>


  <!--

    const slug = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                        .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');

    /* ---------------------- CSV parser (RFC 4180-ish) ---------------------- */
    function parseCsv(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      const t = text.replace(/\r\n?/g, '\n').replace(/^\s*\n/, '');
      for (let i = 0; i < t.length; i++) {
        const c = t[i];
        if (inQuotes) {
          if (c === '"') {
            if (t[i + 1] === '"') { field += '"'; i++; }
            else { inQuotes = false; }
          } else field += c;
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else field += c;
        }
      }
      if (field !== '' || row.length) { row.push(field); rows.push(row); }
      while (rows.length && rows[0].every(v => v.trim() === '')) rows.shift();
      while (rows.length && rows[rows.length - 1].every(v => v.trim() === '')) rows.pop();
      if (!rows.length) return [];
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(r => Object.fromEntries(
        headers.map((h, i) => [h, (r[i] ?? '').trim()])
      ));
    }

    /* ---------------------- Domain mapping: indoor ---------------------- */
    function parseCourtValue(value) {
      if (value == null || value === '') {
        return { count: 0, pinLabel: '?', tagLabel: 'courts n/a', detail: null };
      }
      if (typeof value === 'number') {
        return { count: value, pinLabel: String(value), tagLabel: `${value} indoor`, detail: null };
      }
      const raw = String(value);
      const label = raw.match(/^\s*(\d+(?:[\u2013\u2014-]\d+)?)/)?.[1] || '?';
      return {
        count: parseInt(label, 10) || 0,
        pinLabel: label,
        tagLabel: label === '?' ? 'indoor courts n/a' : `${label} indoor`,
        detail: raw,
      };
    }
    function parseOutdoorValue(value) {
      if (value == null || value === '') return { tagLabel: '', detail: null };
      const raw = String(value);
      const label = raw.match(/^\s*(\d+(?:[\u2013\u2014-]\d+)?)/)?.[1];
      return {
        tagLabel: label ? `+ ${label} outdoor` : `+ ${raw}`,
        detail: label ? raw : null,
      };
    }
    function rowToVenue(r, idx) {
      const country = COUNTRY_FROM_NAME[(r.country || '').toUpperCase()]
                    || (r.country || '').slice(0, 2).toUpperCase()
                    || 'XX';
      const indoor = r.indoor_sand_courts;
      let courtsIndoor;
      if (!indoor || indoor === 'not_stated_publicly') courtsIndoor = null;
      else if (/^\d+$/.test(indoor)) courtsIndoor = parseInt(indoor, 10);
      else courtsIndoor = indoor;
      const indoorDisplay  = parseCourtValue(courtsIndoor);
      const outdoorDisplay = parseOutdoorValue(r.outdoor_courts_same_venue);
      return {
        category: 'indoor',
        id:        slug(`${country}-${r.facility_name}`) || `venue-${idx}`,
        country,
        name:      r.facility_name,
        town:      r.town,
        address:   r.address,
        lat:       parseFloat(r.latitude),
        lng:       parseFloat(r.longitude),
        precision: r.coord_precision || 'address',
        type:      TYPE_LABELS[r.facility_type] || r.facility_type,
        courtsIndoor,
        courtCount:    indoorDisplay.count,
        courtPinLabel: indoorDisplay.pinLabel,
        courtTagLabel: indoorDisplay.tagLabel,
        courtDetail:   indoorDisplay.detail,
        courtsOutdoor:   r.outdoor_courts_same_venue || null,
        outdoorTagLabel: outdoorDisplay.tagLabel,
        outdoorDetail:   outdoorDisplay.detail,
        currency:  r.currency,
        priceNote: r.price_notes,
        url:       r.booking_or_info_url,
      };
    }

    /* ---------------------- Domain mapping: outdoor ---------------------- */
    function rowToOutdoor(r, idx) {
      const lipasId = r.lipas_id || `idx-${idx}`;
      const courts = parseInt(r.outdoor_courts, 10) || 0;
      return {
        category: 'outdoor',
        id:       `fi-out-${lipasId}`,
        country:  'FI',
        name:     r.facility_name,
        town:     r.town,
        address:  r.address,
        lat:      parseFloat(r.latitude),
        lng:      parseFloat(r.longitude),
        precision: r.coord_precision || 'address',
        courts,
        courtsLabel: r.outdoor_courts || '',
        surface:  r.surface || '',
        lighting: r.lighting === 'yes',
        freeUse:  r.free_use === 'yes',
        access:   r.access || 'public',
        owner:    r.owner || '',
        lipasId,
        url:      r.source_url || '',
      };
    }

    /* ---------------------- State ---------------------- */
    const state = {
      category: 'indoor',   // 'indoor' | 'outdoor' | 'both'
      country: 'all',
      query: '',
      selectedId: null,
      sidebarOpen: false,
      returnFocusTo: null,
    };
    let INDOOR_VENUES  = [];
    let OUTDOOR_VENUES = [];
    let outdoorLoaded  = false;
    let outdoorLoading = null;  // Promise while loading

    /* ---------------------- Map ---------------------- */
    const map = L.map('map', { zoomControl: false, scrollWheelZoom: true, worldCopyJump: false })
                  .setView([63, 16], 4);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    }).addTo(map);

    /* ---------------------- Cluster groups ---------------------- */
    const indoorLayer = L.markerClusterGroup({
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      maxClusterRadius: zoom => zoom < 5 ? 26 : zoom < 7 ? 18 : 12,
      zoomToBoundsOnClick: true,
      animateAddingMarkers: false,
      disableClusteringAtZoom: 9,
      iconCreateFunction: cluster => {
        let total = 0;
        const countries = new Set();
        for (const m of cluster.getAllChildMarkers()) {
          total += (m.options._courts || 0);
          countries.add(m.options._country);
        }
        const display = total || cluster.getChildCount();
        const big = display >= 100;
        const country = countries.size === 1 ? [...countries][0] : null;
        const colour = country ? (COUNTRIES[country]?.color || '#0f172a') : '#0f172a';
        return L.divIcon({
          className: 'bv-cluster' + (big ? ' bv-cluster--lg' : ''),
          html: `<span class="bv-cluster__inner" style="background:${colour}">${display}</span>`,
          iconSize: big ? [48, 48] : [40, 40],
        });
      },
    }).addTo(map);

    const outdoorLayer = L.markerClusterGroup({
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      maxClusterRadius: zoom => zoom < 6 ? 60 : zoom < 9 ? 40 : 20,
      zoomToBoundsOnClick: true,
      animateAddingMarkers: false,
      disableClusteringAtZoom: 12,
      iconCreateFunction: cluster => {
        const count = cluster.getChildCount();
        return L.divIcon({
          className: 'bv-out-cluster',
          html: `<span class="bv-out-cluster__inner">${count}</span>`,
          iconSize: [36, 36],
        });
      },
    }); // not added to map until outdoor mode is activated

    const markerById = new Map();

    /* ---------------------- Indoor marker building ---------------------- */
    function buildIndoorMarkers() {
      INDOOR_VENUES.forEach(v => {
        const colour = COUNTRIES[v.country]?.color || '#0f172a';
        const icon = L.divIcon({
          className: 'bv-marker',
          html: `<span class="bv-marker__dot" style="--country:${colour}">${escapeHtml(v.courtPinLabel)}</span>`,
          iconSize:    [32, 32],
          iconAnchor:  [16, 16],
          popupAnchor: [0, -16],
        });
        const m = L.marker([v.lat, v.lng], {
          icon, title: v.name, riseOnHover: true,
          _courts: v.courtCount, _country: v.country,
        });
        m.bindPopup(buildIndoorPopup(v), { closeButton: true, maxWidth: 320, minWidth: 240 });
        m.on('click', () => selectVenue(v.id, { fly: false, openPopup: false }));
        markerById.set(v.id, m);
      });
      syncMarkers();
    }

    /* ---------------------- Outdoor marker building ---------------------- */
    function buildOutdoorMarkers() {
      OUTDOOR_VENUES.forEach(v => {
        const icon = L.divIcon({
          className: 'bv-out-marker',
          html: `<span class="bv-out-marker__dot">${escapeHtml(v.courtsLabel || '')}</span>`,
          iconSize:    [22, 22],
          iconAnchor:  [11, 11],
          popupAnchor: [0, -11],
        });
        const m = L.marker([v.lat, v.lng], {
          icon, title: v.name, riseOnHover: true,
          _courts: v.courts || 1, _country: 'FI',
        });
        m.bindPopup(buildOutdoorPopup(v), { closeButton: true, maxWidth: 280, minWidth: 200 });
        m.on('click', () => selectVenue(v.id, { fly: false, openPopup: false }));
        markerById.set(v.id, m);
      });
    }

    /* ---------------------- Sync both layers to state ---------------------- */
    function syncMarkers() {
      const showIndoor  = state.category !== 'outdoor';
      const showOutdoor = state.category !== 'indoor';

      // Indoor layer
      indoorLayer.clearLayers();
      if (showIndoor) {
        const active = INDOOR_VENUES
          .filter(v => state.country === 'all' || v.country === state.country)
          .map(v => markerById.get(v.id))
          .filter(Boolean);
        indoorLayer.addLayers(active);
        if (!map.hasLayer(indoorLayer)) map.addLayer(indoorLayer);
      } else {
        if (map.hasLayer(indoorLayer)) map.removeLayer(indoorLayer);
      }

      // Outdoor layer
      if (showOutdoor && outdoorLoaded) {
        outdoorLayer.clearLayers();
        const include = state.country === 'all' || state.country === 'FI';
        if (include) {
          outdoorLayer.addLayers(
            OUTDOOR_VENUES.map(v => markerById.get(v.id)).filter(Boolean)
          );
        }
        if (!map.hasLayer(outdoorLayer)) map.addLayer(outdoorLayer);
      } else {
        if (map.hasLayer(outdoorLayer)) map.removeLayer(outdoorLayer);
      }
    }

    /* ---------------------- Popups ---------------------- */
    function buildIndoorPopup(v) {
      const c = COUNTRIES[v.country] || { flag: '', name: v.country };
      const courts = v.courtsIndoor == null
        ? '<span class="tag">indoor courts n/a</span>'
        : `<span class="tag tag--strong"${v.courtDetail ? ` title="${escapeHtml(v.courtDetail)}"` : ''}>${escapeHtml(v.courtTagLabel)}</span>`;
      const out = !v.outdoorTagLabel ? ''
        : `<span class="tag tag--out"${v.outdoorDetail ? ` title="${escapeHtml(v.outdoorDetail)}"` : ''}>${escapeHtml(v.outdoorTagLabel)}</span>`;
      const precisionTag = v.precision === 'town'
        ? '<span class="tag tag--note" title="Marker placed at town level — address-precise location not yet verified">~ town</span>' : '';
      return `
        <div>
          <h3 class="popup__name">${escapeHtml(v.name)}</h3>
          <div class="popup__meta">${c.flag} ${escapeHtml(c.name)} · ${escapeHtml(v.town)}<br/>${escapeHtml(v.address)}</div>
          <div class="popup__row">${courts}${out}<span class="tag">${escapeHtml(v.currency || '')}</span>${precisionTag}</div>
          <p class="popup__price">${escapeHtml(v.priceNote || '')}</p>
          <a class="popup__cta" href="${escapeHtml(v.url)}" target="_blank" rel="noopener noreferrer">Open booking ↗</a>
        </div>`;
    }

    function buildOutdoorPopup(v) {
      const courtStr = v.courtsLabel
        ? `${v.courtsLabel} court${v.courts !== 1 ? 's' : ''}`
        : 'outdoor sand';
      const tags = [
        `<span class="tag tag--out">${escapeHtml(courtStr)}</span>`,
        v.surface   ? `<span class="tag">${escapeHtml(v.surface)}</span>` : '',
        v.freeUse   ? '<span class="tag">free</span>' : '',
        v.lighting  ? '<span class="tag">lit</span>'  : '',
        v.precision === 'town'
          ? '<span class="tag tag--note" title="Marker placed at town level">~ town</span>' : '',
      ].filter(Boolean).join('');
      const cta = v.url
        ? `<a class="popup__cta popup__cta--out" href="${escapeHtml(v.url)}" target="_blank" rel="noopener noreferrer">LIPAS info ↗</a>`
        : '';
      const loc = v.town ? `${escapeHtml(v.town)}<br/>${escapeHtml(v.address)}` : escapeHtml(v.address);
      return `
        <div>
          <h3 class="popup__name">${escapeHtml(v.name)}</h3>
          <div class="popup__meta">🇫🇮 Finland · ${loc}</div>
          <div class="popup__row">${tags}</div>
          ${cta}
        </div>`;
    }

    /* ---------------------- Render: Chips ---------------------- */
    function selectCountry(id) {
      state.country = id;
      render();
      const venues = state.category === 'indoor'   ? INDOOR_VENUES :
                     state.category === 'outdoor'  ? OUTDOOR_VENUES :
                     [...INDOOR_VENUES, ...OUTDOOR_VENUES];
      const filtered = id === 'all' ? venues : venues.filter(v => v.country === id);
      if (!filtered.length) return;
      const bounds = L.latLngBounds(filtered.map(v => [v.lat, v.lng]));
      map.flyToBounds(bounds, { padding: [60, 60], maxZoom: 7, duration: 0.55 });
    }

    function renderChips() {
      const chips = $('#chips');
      chips.innerHTML = '';
      // Outdoor is Finland-only; no country filter chip needed
      if (state.category === 'outdoor') return;

      const make = (id, label, color) => ce('button', {
        class: 'chip', type: 'button',
        'aria-pressed': state.country === id ? 'true' : 'false',
        'data-country': id,
        onclick: () => selectCountry(id),
      },
        color ? ce('span', { class: 'chip__dot', style: `background:${color}` }) : null,
        label
      );
      chips.append(make('all', 'All'));
      Object.entries(COUNTRIES).forEach(([code, m]) => chips.append(make(code, `${m.flag} ${m.name}`, m.color)));
    }

    /* ---------------------- Render: Mode notice ---------------------- */
    function renderModeNotice() {
      const notice = $('#mode-notice');
      if (!notice) return;
      if (state.category === 'outdoor') {
        notice.hidden = false;
        notice.textContent = '🇫🇮 Finland outdoor sand courts · LIPAS open data (CC BY 4.0) · loose sand only';
      } else if (state.category === 'both') {
        notice.hidden = false;
        notice.textContent = '🌿 Outdoor courts: Finland only for now · more countries coming';
      } else {
        notice.hidden = true;
      }
    }

    /* ---------------------- Render: Cards ---------------------- */
    function buildIndoorCard(v) {
      const c = COUNTRIES[v.country] || { flag: '', name: v.country, color: '#0f172a' };
      const item = ce('li', { class: 'venue-list__item' });
      const card = ce('button', {
        class: 'card',
        type: 'button',
        'data-id': v.id,
        'aria-current': state.selectedId === v.id ? 'true' : 'false',
        style: `--country:${c.color}`,
        onclick: () => {
          selectVenue(v.id, { fly: true, openPopup: true });
          if (window.matchMedia('(max-width: 700px)').matches) setSidebar(false);
        },
      });
      const flag = ce('span', { class: 'card__flag', 'aria-hidden': 'true' }, c.flag);
      const body = ce('div',  { class: 'card__body' });
      const name = ce('div',  { class: 'card__name' }, v.name);
      const town = ce('div',  { class: 'card__town' }, `${v.town} · ${v.address}`);
      const meta = ce('div',  { class: 'card__meta' });
      meta.append(ce('span', { class: 'tag tag--strong', title: v.courtDetail },
        v.courtsIndoor == null ? 'courts n/a' : v.courtTagLabel));
      if (v.outdoorTagLabel)
        meta.append(ce('span', { class: 'tag tag--out', title: v.outdoorDetail }, v.outdoorTagLabel));
      if (v.currency)
        meta.append(ce('span', { class: 'tag' }, v.currency));
      if (v.precision === 'town')
        meta.append(ce('span', { class: 'tag tag--note', title: 'Marker placed at town level' }, '~ town'));
      body.append(name, town, meta);
      card.append(flag, body);
      item.append(card);
      return item;
    }

    function buildOutdoorCard(v) {
      const item = ce('li', { class: 'venue-list__item' });
      const card = ce('button', {
        class: 'card card--outdoor',
        type: 'button',
        'data-id': v.id,
        'aria-current': state.selectedId === v.id ? 'true' : 'false',
        style: `--country:${OUTDOOR_COLOR}`,
        onclick: () => {
          selectVenue(v.id, { fly: true, openPopup: true });
          if (window.matchMedia('(max-width: 700px)').matches) setSidebar(false);
        },
      });
      const flag = ce('span', { class: 'card__flag', 'aria-hidden': 'true' }, '🏐');
      const body = ce('div', { class: 'card__body' });
      const name = ce('div', { class: 'card__name' }, v.name);
      const town = ce('div', { class: 'card__town' },
        v.town ? `${v.town} · ${v.address}` : v.address);
      const meta = ce('div', { class: 'card__meta' });
      const courtsStr = v.courtsLabel ? `${v.courtsLabel} outdoor` : 'outdoor';
      meta.append(ce('span', { class: 'tag tag--out' }, courtsStr));
      if (v.surface)  meta.append(ce('span', { class: 'tag' }, v.surface));
      if (v.freeUse)  meta.append(ce('span', { class: 'tag' }, 'free'));
      if (v.lighting) meta.append(ce('span', { class: 'tag' }, 'lit'));
      body.append(name, town, meta);
      card.append(flag, body);
      item.append(card);
      return item;
    }

    /* ---------------------- Render: List ---------------------- */
    function renderList() {
      const list = $('#venues');
      const hint = $('#hint');
      list.innerHTML = '';

      const venues =
        state.category === 'indoor'  ? INDOOR_VENUES :
        state.category === 'outdoor' ? (outdoorLoaded ? OUTDOOR_VENUES : []) :
        [...INDOOR_VENUES, ...(outdoorLoaded ? OUTDOOR_VENUES : [])];

      const filtered = venues
        .filter(v => state.country === 'all' || v.country === state.country)
        .filter(v => matchesQuery(v, state.query.toLowerCase()))
        .sort((a, b) => {
          // In mixed mode: indoor halls first, then outdoor courts
          if (a.category !== b.category) return a.category === 'indoor' ? -1 : 1;
          if (a.category === 'indoor')
            return a.country.localeCompare(b.country) || a.name.localeCompare(b.name);
          return (a.town || '').localeCompare(b.town || '') || a.name.localeCompare(b.name);
        });

      filtered.slice(0, CARD_LIMIT).forEach(v => {
        list.append(v.category === 'outdoor' ? buildOutdoorCard(v) : buildIndoorCard(v));
      });

      // Toggle button count badge
      const modeTotal =
        state.category === 'indoor'  ? INDOOR_VENUES.length :
        state.category === 'outdoor' ? (outdoorLoaded ? OUTDOOR_VENUES.length : '…') :
        INDOOR_VENUES.length + (outdoorLoaded ? OUTDOOR_VENUES.length : 0);
      $('#sidebar-toggle-count').textContent = String(modeTotal);

      let hintText;
      if (state.category !== 'indoor' && !outdoorLoaded) {
        hintText = 'Loading outdoor courts…';
      } else if (filtered.length === 0) {
        hintText = 'No venues match your filter.';
      } else {
        const single =
          state.category === 'indoor'  ? 'indoor hall' :
          state.category === 'outdoor' ? 'outdoor sand court' : 'venue';
        const plural =
          state.category === 'indoor'  ? 'indoor halls' :
          state.category === 'outdoor' ? 'outdoor sand courts' : 'venues';
        const label = filtered.length === 1 ? single : plural;
        if (filtered.length > CARD_LIMIT) {
          hintText = `Showing ${CARD_LIMIT} of ${filtered.length} ${plural}. Search to narrow.`;
        } else {
          hintText = `Showing ${filtered.length} ${label}.`;
        }
      }
      hint.textContent = hintText;
    }

    /* ---------------------- Selection sync ---------------------- */
    function syncActiveMarker(id) {
      markerById.forEach((mm, mid) => {
        const el = mm.getElement();
        if (el) el.classList.toggle('is-active', mid === id);
      });
    }

    function selectVenue(id, { fly = true, openPopup = true } = {}) {
      state.selectedId = id;
      document.querySelectorAll('.card').forEach(card => {
        card.setAttribute('aria-current', card.dataset.id === id ? 'true' : 'false');
      });
      const v = INDOOR_VENUES.find(x => x.id === id) || OUTDOOR_VENUES.find(x => x.id === id);
      const m = markerById.get(id);
      if (!v || !m) return;

      const finish = () => {
        syncActiveMarker(id);
        if (openPopup) m.openPopup();
      };

      if (fly) {
        const layer = v.category === 'outdoor' ? outdoorLayer : indoorLayer;
        if (typeof layer.zoomToShowLayer === 'function') {
          layer.zoomToShowLayer(m, finish);
        } else {
          map.flyTo([v.lat, v.lng], Math.max(map.getZoom(), 11), { duration: 0.6 });
          map.once('moveend', finish);
        }
      } else {
        finish();
      }

      const card = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
      if (card && state.sidebarOpen) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    /* ---------------------- Mode switching ---------------------- */
    async function setMode(mode) {
      state.category = mode;
      state.country  = 'all';

      // Update button aria-pressed and push a history entry for back/forward
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.setAttribute('aria-pressed', btn.dataset.mode === mode ? 'true' : 'false');
      });
      syncHash(mode, true);

      // Show loading state immediately before async work
      if (mode !== 'indoor' && !outdoorLoaded) {
        render();
        try {
          await loadOutdoorCsv();
        } catch (err) {
          console.error('[nordic-bv-map] outdoor data failed:', err);
          const hint = $('#hint');
          if (hint) hint.textContent = 'Failed to load outdoor court data: ' + err.message;
          return;
        }
      }

      render();

      // Fly to appropriate bounds
      const venues =
        mode === 'indoor'  ? INDOOR_VENUES :
        mode === 'outdoor' ? OUTDOOR_VENUES :
        [...INDOOR_VENUES, ...OUTDOOR_VENUES];
      if (venues.length) {
        map.fitBounds(
          L.latLngBounds(venues.map(v => [v.lat, v.lng])),
          { padding: [40, 40], maxZoom: mode === 'outdoor' ? 5 : 6 }
        );
      }
    }

    /* ---------------------- Lazy outdoor data load ---------------------- */
    async function loadOutdoorCsv() {
      if (outdoorLoaded) return;
      if (outdoorLoading) return outdoorLoading;
      outdoorLoading = (async () => {
        const res = await fetch('finland_outdoor_beach_volleyball_courts.csv', { cache: 'no-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        OUTDOOR_VENUES = parseCsv(text)
          .map(rowToOutdoor)
          .filter(v => Number.isFinite(v.lat) && Number.isFinite(v.lng));
        buildOutdoorMarkers();
        outdoorLoaded  = true;
        outdoorLoading = null;
      })();
      return outdoorLoading;
    }

    /* ---------------------- Boot: indoor CSV ---------------------- */
    async function loadCsv() {
      try {
        const res = await fetch('nordic_indoor_beach_volleyball_facilities.csv', { cache: 'no-cache' });
        if (res.ok) return { source: 'fetch', text: await res.text() };
      } catch (_) { /* fall through to inline */ }
      const inline = $('#venues-csv')?.textContent;
      if (inline && inline.trim()) return { source: 'inline', text: inline };
      throw new Error('No CSV source available');
    }

    function showSourceBadge(source) {
      const badge = $('#source-badge');
      const text  = $('#source-badge-text');
      if (!badge) return;
      badge.hidden = false;
      if (source === 'fetch') {
        text.textContent = 'Live from CSV';
        badge.title = 'Loaded from nordic_indoor_beach_volleyball_facilities.csv via fetch().';
      } else {
        text.textContent = 'Inline data';
        badge.title = 'Loaded from the inline CSV mirror (file:// or fetch unavailable).';
      }
    }

    function render() { renderModeNotice(); renderChips(); renderList(); syncMarkers(); }

    /* ---------------------- Sidebar drawer ---------------------- */
    function setSidebar(open) {
      const sidebar = $('#sidebar');
      const toggle  = $('#sidebar-toggle');
      state.sidebarOpen = open;
      if (open) state.returnFocusTo = document.activeElement;
      $('#layout').classList.toggle('is-open', open);
      sidebar.classList.toggle('is-open', open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      if (open) {
        requestAnimationFrame(() => $('#search')?.focus({ preventScroll: true }));
      } else if (state.returnFocusTo && document.contains(state.returnFocusTo)) {
        state.returnFocusTo.focus({ preventScroll: true });
        state.returnFocusTo = null;
      }
    }

    function trapSidebarFocus(event) {
      if (!state.sidebarOpen || event.key !== 'Tab') return;
      const focusable = [...$('#sidebar').querySelectorAll(
        'a[href], button:not([disabled]), input:not([disabled]), [tabindex]:not([tabindex="-1"])'
      )].filter(el => el.offsetParent !== null);
      if (!focusable.length) return;
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault(); last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault(); first.focus();
      }
    }

    /* ---------------------- Event wiring ---------------------- */
    function attachEvents() {
      $('#search').addEventListener('input', e => {
        state.query = e.target.value.trim();
        renderList();
      });
      map.on('popupopen', e => {
        const id = [...markerById.entries()].find(([, m]) => m === e.popup._source)?.[0];
        if (id && id !== state.selectedId) selectVenue(id, { fly: false, openPopup: false });
      });
      $('#sidebar-toggle').addEventListener('click', () => setSidebar(!state.sidebarOpen));
      $('#sidebar-close').addEventListener('click',  () => setSidebar(false));
      $('#sidebar-backdrop').addEventListener('click', () => setSidebar(false));
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && state.sidebarOpen) setSidebar(false);
        trapSidebarFocus(e);
      });
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => setMode(btn.dataset.mode));
      });

      // Browser back/forward through mode history
      window.addEventListener('hashchange', () => {
        const mode = modeFromHash();
        if (mode !== state.category) setMode(mode);
      });
    }

    /* ---------------------- Hash-based navigation ---------------------- */
    const VALID_MODES = new Set(['indoor', 'outdoor', 'both']);

    function modeFromHash() {
      const raw = location.hash.replace(/^#/, '').toLowerCase();
      return VALID_MODES.has(raw) ? raw : 'indoor';
    }

    function syncHash(mode, push = false) {
      const target = '#' + mode;
      if (location.hash !== target) {
        if (push) history.pushState(null, '', target);
        else       history.replaceState(null, '', target);
      }
    }

    /* ---------------------- Boot ---------------------- */
    (async () => {
      try {
        // Set initial state from URL hash before first render
        state.category = modeFromHash();
        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.setAttribute('aria-pressed', btn.dataset.mode === state.category ? 'true' : 'false');
        });

        const { source, text } = await loadCsv();
        INDOOR_VENUES = parseCsv(text)
          .map(rowToVenue)
          .filter(v => Number.isFinite(v.lat) && Number.isFinite(v.lng));
        if (!INDOOR_VENUES.length) throw new Error('CSV produced 0 valid rows');

        buildIndoorMarkers();

        // If starting in outdoor/both, lazy-load outdoor data before first render
        if (state.category !== 'indoor') {
          try { await loadOutdoorCsv(); } catch (_) { /* show indoor anyway */ }
        }

        const venues = state.category === 'outdoor' ? OUTDOOR_VENUES :
                       state.category === 'both'    ? [...INDOOR_VENUES, ...(outdoorLoaded ? OUTDOOR_VENUES : [])] :
                       INDOOR_VENUES;
        const bounds = venues.length
          ? L.latLngBounds(venues.map(v => [v.lat, v.lng]))
          : L.latLngBounds(INDOOR_VENUES.map(v => [v.lat, v.lng]));
        map.fitBounds(bounds, {
          padding: [40, 40],
          maxZoom: state.category === 'outdoor' ? 5 : 6,
        });

        render();
        attachEvents();
        showSourceBadge(source);
        syncHash(state.category);
      } catch (err) {
        console.error('[nordic-bv-map] boot failed:', err);
        const hint = $('#hint');
        if (hint) hint.textContent = 'Failed to load venue data: ' + err.message;
      }
    })();
  </script>
</body>
</html>
