<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nordic &amp; Baltic Beach Volleyball — indoor halls and outdoor sand courts map</title>
    <meta
      name="description"
      content="An interactive map and directory of indoor beach-volleyball halls and outdoor sand courts across Finland, Sweden, Norway, Denmark, Iceland, Estonia, Latvia and Lithuania."
    />
    <meta name="color-scheme" content="light" />

    <!--
    Page-scoped CSP. unsafe-inline is only needed for the tiny pre-paint
    mode-button script; CSV-derived URLs are sanitized through safeUrl()
    before being rendered as <a href>.
  -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'self';
    script-src  'self' https://unpkg.com 'unsafe-inline';
    style-src   'self' https://fonts.googleapis.com https://unpkg.com 'unsafe-inline';
    font-src    https://fonts.gstatic.com;
    img-src     'self' data: https://*.tile.openstreetmap.org;
    connect-src 'self';
    object-src  'none';
    base-uri    'self';
    form-action 'self';
  "
    />

    <link rel="icon" type="image/svg+xml" href="mikasa-ball.svg?v=1783626559" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
      integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="styles.css?v=1783626559" />
  </head>
  <body>
    <a class="skip-link" id="skip-link" href="#sidebar">Skip to venue directory</a>

    <header class="topbar">
      <span class="topbar__mark"><img src="mikasa-ball.svg" alt="" width="32" height="32" /></span>
      <div class="topbar__title">
        <h1>Nordic &amp; Baltic Beach Volleyball</h1>
        <p>
          Indoor sand halls &amp; outdoor courts — Finland, Sweden, Norway, Denmark, Iceland, Estonia, Latvia &amp;
          Lithuania
        </p>
      </div>
      <div class="mode-switch" id="mode-switch" role="group" aria-label="Display mode">
        <button class="mode-btn" data-mode="indoor" aria-pressed="false">Indoor</button>
        <button class="mode-btn" data-mode="outdoor" aria-pressed="false">Outdoor</button>
        <button class="mode-btn" data-mode="both" aria-pressed="false">Both</button>
      </div>
      <script>
        // Synchronously flip the correct mode button BEFORE the browser paints,
        // so loading /#outdoor or /#both doesn't briefly highlight "Indoor".
        // Duplicates a sliver of map-data.js parseHash (bare word, #/path, legacy ?mode=)
        // because that module loads at end-of-body, after the topbar has already painted.
        (function () {
          var raw = (location.hash || '').replace(/^#/, '').trim();
          var lower = raw.toLowerCase();
          var rx = /^(indoor|outdoor|both)$/;
          var mode = 'indoor';
          if (lower.charAt(0) === '/') {
            var seg = lower.slice(1).split(/[/?]/)[0];
            if (rx.test(seg)) mode = seg;
          } else if (rx.test(lower)) {
            mode = lower;
          } else {
            var fromQs = new URLSearchParams(lower).get('mode') || '';
            if (rx.test(fromQs)) mode = fromQs;
          }
          if (!rx.test(mode)) mode = 'indoor';
          var btns = document.getElementById('mode-switch').querySelectorAll('.mode-btn');
          for (var i = 0; i < btns.length; i++) {
            btns[i].setAttribute('aria-pressed', btns[i].dataset.mode === mode ? 'true' : 'false');
          }
        })();
      </script>
    </header>

    <main class="layout" id="layout">
      <section class="map-wrap" aria-label="Map">
        <div id="map" aria-label="Interactive map of beach-volleyball venues"></div>

        <button
          class="sidebar-toggle"
          id="sidebar-toggle"
          aria-controls="sidebar"
          aria-expanded="false"
          title="Show venue directory"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="4" y1="6" x2="20" y2="6" />
            <line x1="4" y1="12" x2="20" y2="12" />
            <line x1="4" y1="18" x2="20" y2="18" />
          </svg>
          <span>Venues</span>
          <span class="sidebar-toggle__count" id="sidebar-toggle-count">…</span>
        </button>

        <a class="data-link" id="data-link" href="nordic_indoor_beach_volleyball_facilities.csv" download
          >↓ Indoor CSV</a
        >
      </section>

      <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>

      <aside
        class="sidebar"
        id="sidebar"
        role="dialog"
        aria-modal="true"
        aria-labelledby="sidebar-title"
        aria-hidden="true"
        tabindex="-1"
        inert
      >
        <div class="sidebar__header">
          <h2 class="sidebar__title" id="sidebar-title">Venues</h2>
          <button class="sidebar__close" id="sidebar-close" aria-label="Close venue directory">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line x1="6" y1="6" x2="18" y2="18" />
              <line x1="6" y1="18" x2="18" y2="6" />
            </svg>
          </button>
        </div>
        <div class="filters">
          <label class="search" aria-label="Search venues">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.5-3.5"></path>
            </svg>
            <input id="search" type="search" placeholder="Search venues, towns, addresses…" autocomplete="off" />
          </label>
          <div class="chips" id="chips" aria-label="Filter venues by country"></div>
          <p class="mode-notice" id="mode-notice" hidden></p>
        </div>
        <ol class="venue-list" id="venues" role="list"></ol>
        <p class="sidebar__hint" id="hint" role="status" aria-live="polite"></p>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
      integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr"
      crossorigin="anonymous"
    ></script>
    <script src="map-data.js?v=1783626559"></script>

    <script src="dom.js?v=1783626559"></script>
    <script src="venue-view.js?v=1783626559"></script>
    <script src="data-loader.js?v=1783626559"></script>
    <script src="map-view.js?v=1783626559"></script>
    <script src="sidebar-view.js?v=1783626559"></script>
    <script src="app.js?v=1783626559"></script>
  </body>
</html>
